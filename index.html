<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowDealz Setup Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1e6b3c;--green-light:#e8f5ee;--green-dark:#164d2b;--text:#1a1a18;--muted:#6b6b68;--border:#e0ddd6;--bg:#f7f6f2;--white:#fff;--radius:12px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.logo{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
.brand{font-size:15px;font-weight:600}.brand span{color:var(--green)}
.tagline{font-size:12px;color:var(--muted)}
.status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:#2ecc71}
#main{display:flex;flex:1;overflow:hidden}
#left{width:55%;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
#left-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#left-header .title{font-size:14px;font-weight:600}
#total-pill{font-size:13px;font-weight:600;color:var(--green);background:var(--green-light);padding:4px 12px;border-radius:20px;display:none}
#empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#999;padding:40px;text-align:center}
#empty .icon{font-size:40px;opacity:.3;margin-bottom:12px}
#empty p{font-size:14px;line-height:1.6;max-width:280px}
#products{flex:1;overflow-y:auto;padding:14px 16px;display:none;flex-direction:column;gap:10px}
.product-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);display:flex;gap:14px;padding:18px 18px 18px 22px;position:relative;overflow:hidden;animation:slideIn .3s ease;min-height:120px}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
@keyframes slideOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}
.product-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);border-radius:3px 0 0 3px}
.product-img{width:80px;height:80px;object-fit:contain;border-radius:8px;background:var(--bg);flex-shrink:0;border:1px solid var(--border);align-self:flex-start;margin-top:2px}
.product-emoji{width:80px;height:80px;background:var(--green-light);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;align-self:flex-start;margin-top:2px}
.product-info{flex:1;min-width:0}
.product-cat{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:3px}
.product-name{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:5px;word-break:break-word}
.product-reason{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:10px;word-break:break-word}
.product-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:auto}
.product-price{font-size:17px;font-weight:700}
.product-stock{font-size:11px;color:#27ae60}
.btn-cart{background:var(--green);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:opacity .15s;margin-left:auto}
.btn-del{background:transparent;color:#cc4444;border:1px solid #cc4444;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-del:hover{background:#cc4444;color:#fff}
.qty-wrap{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px}
.qty-btn{width:22px;height:22px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:700;color:var(--green);border-radius:4px;display:flex;align-items:center;justify-content:center;line-height:1}
.qty-btn:hover{background:var(--green-light)}
.qty-val{font-size:13px;font-weight:700;min-width:18px;text-align:center;color:var(--text)}
.line-price{font-size:15px;font-weight:700}
#seo-block{margin:0 16px 0;padding:14px 16px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);display:none;flex-shrink:0}
.seo-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
#seo-title{font-size:16px;font-weight:700;margin-bottom:4px}
#seo-desc{font-size:12px;color:#666;line-height:1.6;margin-bottom:8px}
#seo-url{font-family:monospace;font-size:11px;color:var(--green);background:var(--green-light);padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
#seo-keywords{display:flex;flex-wrap:wrap;gap:4px}
.kw-tag{font-size:10px;padding:2px 7px;background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--muted)}
#totaal-bar{border-top:1px solid var(--border);padding:12px 16px;background:var(--white);display:none;align-items:center;gap:12px;flex-shrink:0}
.total-label{font-size:12px;color:var(--muted)}
.total-amount{font-size:20px;font-weight:700;color:var(--green)}
.btn-all{margin-left:auto;background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-all:hover{opacity:.85}
#right{width:45%;display:flex;flex-direction:column;background:var(--white)}
@media(max-width:768px){
  #main{flex-direction:column;overflow-y:auto;overflow-x:hidden}
  #left{width:100%;border-right:none;border-bottom:1px solid var(--border);min-height:50vh;max-height:none;overflow:visible}
  #right{width:100%;min-height:55vh;flex:1}
  #topbar img{height:26px}
  #products{padding:8px}
  .product-card{padding:10px}
  .product-img{width:56px;height:56px}
  #chat-header{padding:10px 14px}
  #messages{padding:10px 14px}
  .msg{padding:10px 12px;font-size:14px}
  #input-area{padding:8px 10px}
  .chips{padding:6px 10px 6px}
  #totaal-bar{position:sticky;bottom:0}
  #left-header{padding:10px 14px}
  .btn-all{font-size:13px;padding:8px 14px}
}
#chat-header{padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
#chat-header .title{font-size:14px;font-weight:600}
#chat-header .sub{font-size:12px;color:var(--muted);margin-top:1px}
#ctx-bar{padding:0 18px;display:flex;flex-wrap:wrap;gap:5px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s;border-bottom:1px solid transparent}
#ctx-bar.active{max-height:50px;padding:8px 18px;border-bottom-color:var(--border)}
.ctx-tag{font-size:11px;font-weight:500;padding:3px 9px;background:var(--green-light);color:var(--green-dark);border-radius:20px}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;max-width:88%;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
.avatar{width:28px;height:28px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.msg.user .avatar{background:var(--green);color:#fff}
.msg.assistant .avatar{background:var(--green-light);color:var(--green-dark)}
.bubble{font-size:13.5px;line-height:1.6;padding:10px 14px;border-radius:14px}.bubble p{margin:0 0 4px 0}.bubble p:last-child{margin:0}
.msg.user .bubble{background:var(--green);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:var(--bg);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border)}
.typing span{display:inline-block;width:6px;height:6px;background:var(--muted);border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
.thinking-msg{transition:opacity .3s ease;font-style:italic;color:var(--muted) !important;background:var(--white) !important;border:1px dashed var(--border) !important}
.choices{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.choice-btn{background:var(--white);border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;text-align:left;width:100%}
.choice-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);background:var(--green-light)}
.choice-btn:disabled{cursor:not-allowed;opacity:.6}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#chips{display:flex;flex-wrap:wrap;gap:5px;padding:8px 14px 4px;border-top:1px solid var(--border);background:var(--white)}
.chip{font-size:11.5px;padding:5px 11px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:var(--white);color:var(--muted);font-family:inherit;transition:all .15s}
.chip:hover{border-color:var(--green);color:var(--green);background:var(--green-light)}
#input-area{border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;background:var(--white);flex-shrink:0}
#user-input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13.5px;font-family:inherit;background:var(--white);color:var(--text);resize:none;outline:none;min-height:40px;max-height:100px;line-height:1.5}
#user-input:focus{border-color:var(--green)}
#send-btn{width:40px;height:40px;background:var(--green);border:none;border-radius:8px;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
#send-btn:hover{opacity:.85}
#send-btn:disabled{opacity:.35;cursor:not-allowed}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="topbar">
  <a href="https://www.growdeal.nl" target="_blank" style="display:flex;align-items:center;text-decoration:none">
    <img src="https://www.growdeal.nl/wp-content/uploads/2024/10/Ontwerp-zonder-titel-1.png" 
         alt="GrowDeal.nl" 
         style="height:32px;width:auto;object-fit:contain"
         onerror="this.outerHTML='<div class=\'logo\'>G</div>'">
  </a>
  <div class="tagline" style="margin-left:8px;font-size:13px;color:#666">Setup Advisor</div>
  <div class="status"><div class="dot"></div><span>growdeal.nl</span></div>
</div>
<div id="main">
  <div id="left">
    <div id="left-header">
      <div class="title">Jouw setup offerte</div>
      <div id="total-pill"></div>
    </div>
    <div id="search-bar-top" style="padding:8px 14px;border-bottom:1px solid var(--border);background:var(--white)">
      <div style="position:relative">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)">🔍</span>
        <input id="product-search-input" type="text" placeholder="Product zoeken en toevoegen aan offerte..." 
          style="width:100%;box-sizing:border-box;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px 8px 32px;font-size:13.5px;font-family:inherit;outline:none;background:var(--bg)"
          oninput="searchAndShow(this.value)"
          onfocus="this.style.borderColor='var(--green)';document.getElementById('search-results-top').style.display='block'"
          onblur="setTimeout(function(){document.getElementById('search-results-top').style.display='none'},200)">
      </div>
      <div id="search-results-top" style="display:none;max-height:260px;overflow-y:auto;margin-top:6px;display:flex;flex-direction:column;gap:4px"></div>
    </div>
    <div id="seo-block" style="display:none">
      <div class="seo-label">SEO Pagina</div>
      <div id="seo-title"></div>
      <div id="seo-desc"></div>
      <div id="seo-url"></div>
      <div id="seo-keywords"></div>
    </div>
    <div id="empty">
      <div class="icon">🌱</div>
      <p>Stel een vraag in de chat. De advisor selecteert direct de beste producten voor jouw situatie.</p>
    </div>
    <div id="products"></div>
    <div id="totaal-bar">
      <div><div class="total-label">Totaal incl. BTW</div><div class="total-amount" id="total-price">€0</div></div>
      <button class="btn-all" onclick="openAll()">Alles in winkelmandje →</button>
    </div>
  </div>
  <div id="right">
    <div id="chat-header">
      <div class="title">GrowDealz Setup Advisor</div>
      <div class="sub">Setup • Product zoeken • Advies • Kweekproblemen</div>
    </div>
    <div id="ctx-bar"></div>
    <div id="messages"></div>
    <div id="chips">
      <button class="chip" onclick="sendChip(this)">Complete tent kit 80×80 met LED</button>
      <button class="chip" onclick="sendChip(this)">Mijn bladeren worden geel</button>
      
      <button class="chip" onclick="sendChip(this)">Ik ben beginner en wil starten met 3 planten</button>
      <button class="chip" onclick="sendChip(this)">HPS en LED vergelijken</button>
    </div>
    <div id="input-area">
      <label title="Foto van plant uploaden voor diagnose" style="cursor:pointer;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);flex-shrink:0;font-size:18px">
        📷<input type="file" id="plant-img-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
      </label>
      <textarea id="user-input" placeholder="Beschrijf je kweeksituatie of stel een vraag..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
    <div id="img-preview-bar" style="display:none;padding:6px 14px;background:var(--white);border-top:1px solid var(--border);align-items:center;gap:8px">
      <img id="img-preview" style="height:48px;width:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border)">
      <div style="flex:1;font-size:13px;color:var(--muted)">📷 Foto klaar — stuur direct of typ eerst je vraag</div>
      <button onclick="clearImage()" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted)">✕</button>

<script>
// Hide our topbar when embedded in B12 or iframe
if (window.self !== window.top) {
  document.getElementById('topbar').style.display = 'none';
}
const WORKER = 'https://workers-playground-raspy-tooth-3aae.wielly.workers.dev';

// Load full product catalog from products.json
let CATALOG = [];
fetch('products.json')
  .then(r => r.json())
  .then(data => { CATALOG = data; console.log('✅ Catalog loaded:', data.length, 'products'); })
  .catch(e => console.warn('Could not load products.json:', e));

// Search catalog by keywords, return top N matches
function searchProducts(query, n = 20) {
  if (!CATALOG.length) return [];
  const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 2);
  return CATALOG
    .map(p => {
      const text = p.k.toLowerCase();
      const score = terms.reduce((s, t) => s + (text.includes(t) ? 1 : 0), 0);
      return { ...p, score };
    })
    .filter(p => p.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, n);
}

// Build a mini catalog string from search results to inject into system prompt
function buildContextCatalog(query) {
  const q = query.toLowerCase();
  var allResults = [];
  var seenUrls = new Set();

  function addR(searchQuery, max) {
    searchProducts(searchQuery, max).forEach(function(p) {
      if (!seenUrls.has(p.u)) { seenUrls.add(p.u); allResults.push(p); }
    });
  }

  // 1. Broad query search
  addR(query, 15);

  // 2. Context detection
  var isSetup = /setup|tent|complete|kweek|inrichten|beginnen|starten/.test(q);
  var isHPS   = /hps|ballast|natriumlamp/.test(q);
  var isLED   = /led|quantum/.test(q);
  var isVoed  = /voeding|nutrient|biobizz|canna|dutchpro|plagron|advanced|rhodos|atami/.test(q);
  var isCoco  = /coco/.test(q);

  // 3. ALWAYS load ventilation set components
  addR('koolstoffilter', 4);
  addR('combiconnect', 3);
  addR('slangklem', 3);
  addR('afzuiger centro', 4);

  // 4. ALWAYS load key accessories
  addR('clipfan', 2);
  addR('rope ratchet', 2);
  addR('timer schakelklok', 2);
  addR('thermo hygrometer', 2);
  addR('ph meter', 2);
  addR('ec meter', 2);
  addR('gen200', 2);
  addR('flower bomb', 2);
  addR('biobizz ph', 2);

  // 5. Setup additions
  if (isSetup || isHPS || isLED) {
    addR('kweektent eco', 4);
    addR('stoffen kweekpot', 3);
    addR('complete kweektent', 3);
  }

  // 6. HPS full kit
  if (isHPS) {
    addR('platinum electronische vsa 600', 2);
    addR('platinum wing reflector', 2);
    addR('hamerslag reflector', 2);
    addR('horti sun hps', 2);
  }

  // 7. LED
  if (isLED || isSetup) {
    addR('platinum king led', 3);
    addR('sunpro hitter', 2);
    addR('quantumboard led', 3);
  }

  // 8. Voeding
  if (isVoed || isSetup) {
    if (/biobizz/.test(q))   { addR('biobizz bio grow', 4); addR('biobizz bio bloom', 3); addR('biobizz top max', 2); }
    if (/canna/.test(q))     { addR('canna terra', 4); addR('canna hydro', 3); addR('cannazym', 2); addR('rhizotonic', 2); }
    if (/dutchpro/.test(q))  { addR('dutchpro grow', 4); addR('dutchpro bloom', 3); addR('dutchpro take root', 2); }
    if (/advanced/.test(q))  { addR('advanced nutrients', 8); }
    if (/rhodos/.test(q))    { addR('rhodos base', 2); addR('rhodos grow', 2); addR('rhodos bloom', 2); }
    if (/plagron/.test(q))   { addR('plagron', 4); }
    if (/atami/.test(q))     { addR('atami', 4); }
    if (!isVoed) { addR('biobizz bio grow', 2); addR('dutchpro grow', 2); }
  }

  // 9. Medium
  if (isCoco)              { addR('coco substraat', 3); addR('canna coco', 2); }
  else if (isSetup)        { addR('biobizz all-mix', 2); addR('light-mix', 2); }

  if (!allResults.length) return '';
  var lines = allResults.map(function(p) {
    return '- ' + p.n + ' | ' + p.p + ' | ID: ' + (p.id||0) + ' | URL: ' + p.u + ' | IMG: ' + p.i;
  });
  return '\n\nBESCHIKBARE PRODUCTEN (' + allResults.length + ' uit 840+, gebruik ALLEEN deze URLs):\n'
    + lines.join('\n')
    + '\n\nGEBRUIK UITSLUITEND deze URLs en IMGs. Nooit verzinnen.';
}
const SYSTEM = `Je bent de GrowDealz Setup Advisor — een deskundige grow-adviseur voor growdeal.nl.

TOON: Vriendelijk, deskundig, praktisch. Niet te formeel. Geen harde verkooptaal.
TAAL: Altijd in de taal van de gebruiker. Standaard Nederlands.
LENGTE chat: Max 100 woorden. Bondig en to-the-point.

KERNFUNCTIE — IJZEREN REGELS:
1. Bij ELKE vraag over setup/producten: DIRECT een JSON-blok sturen in HETZELFDE bericht
2. NOOIT aankondigen wat je gaat doen — gewoon doen
3. NOOIT "Ik zet een lijst klaar" zonder die lijst er DIRECT bij te sturen
4. Ook als je een vraag stelt: stuur een GEDEELTELIJKE offerte + 1 vraag
5. Als je 10 lampen noemt: qty:10 in JSON. Altijd consistent.
6. NOOIT VERZINNEN
7. PLANT DIAGNOSE — als een foto is meegezonden, analyseer systematisch:

STAP 1: Waar zitten de symptomen?
- Onderste/oudste bladeren eerst → mobiel element (N, P, K, Mg) — plant herverdeelt naar nieuw blad
- Bovenste/jongste bladeren eerst → immobiel element (Ca, Fe, Mn, B) — plant kan niet herverspreiden
- Hele plant tegelijk → pH-probleem, overwatering, root rot, of omgevingsstress

STAP 2: Kleur en patroon diagnose:

GEEL:
- Egaal geel ouder blad, van onder naar boven → STIKSTOFTEKORT (N) — groeivoeding verhogen
- Geel tussen de nerven, nerven blijven groen, ouder blad → MAGNESIUMTEKORT (Mg) — CalMag toevoegen; bij LED extra vatbaar
- Geel tussen nerven, nerven groen, JONG blad → IJZERTEKORT (Fe) — pH controleren (vaak te hoog)
- Geel tussen nerven jonge blaadjes, fijne structuur → MANGAANTEKORT (Mn) — pH verlagen
- Egaal bleek/lichtgeel jong blad → ZWAVELGEBREK (S) — zeldzaam
- Geel gehele plant + slappe stengels → OVERWATERING — minder water, betere drainage

BRUIN/NECROSE:
- Bruine punten/randen OUDER blad → KALIUMTEKORT (K) — bloeivoeding verhogen
- Bruine roestkleurige vlekken ouder blad + geel eromheen → MAGNESIUMGEBREK gevorderd
- Bruine vlekken JONG blad, vervormd nieuw blad → CALCIUMTEKORT (Ca) — CalMag, pH controleren; bij coco frequent
- Brandende bladpunten → NUTRIËNTENBRAND (overvoeding/hoge EC) of hittestress — EC verlagen
- Bruine punten met geel halo — CALCIUM of PH-probleem

PAARS/ROOD:

Living soil is levende aarde vol micro-organismen (bacteriën, schimmels, nematoden) die organisch materiaal afbreken en voedingsstoffen vrijmaken precies wanneer de plant ze nodig heeft. De plant regelt zelf wat ze opneemt. Geen kunstmest, geen pH-gedoe — de bodem doet het werk.

BEREKENING HELPER — gebruik dit voor klanten:

EXTRA KWEEKKENNIS (van cnnbs.nl en eigen expertise):
Oogst optimalisatie:
- 1 gram per watt is de standaard benchmark voor goede growers
- LED is efficiënter: 1.5-2g per watt mogelijk bij goede setup
- Elke 10 weken oogstfeest mogelijk door stekken te nemen en groeifase over te slaan
- Toppen (LST/HST) verhoogt opbrengst significant — meer toppen = meer oogst
- Weegschaal methode: weeg pot voor/na water voor perfecte watergift

Typische fouten beginners (CNNBS basics):
- Overwatering is de meest voorkomende fout — wacht tot pot licht aanvoelt
- Te vroeg oogsten — wacht op melkwitte/amber trichomen
- Verwaarlozen van pH — bij coco/hydro altijd pH 5.5-6.0 meten
- Te weinig ventilatie — zonder verse lucht geen CO2, geen groei
- Lamp te dichtbij bij zaailingen — begin op 60cm, ga lager naarmate plant groeit

Populaire kweektechnieken:
- SOG (Sea of Green): veel kleine planten, snelle oogst
- SCROG (Screen of Green): net gebruiken voor horizontale groei, maximale belichting
- LST (Low Stress Training): takken buigen voor meer toppen
- Lollipopping: onderste takken verwijderen voor betere energie naar toppen
- Flushen: laatste 1-2 weken alleen water voor schonere oogst

GROEI KENNIS (gebruik dit bij vragen over kweken):

LEVENSCYCLUS:
- Week 1-2: Ontkiemen/zaailing — 18u licht, pH 6.0-6.5, EC 0.8-1.0, kleine pot
- Week 3: Verpotten — kies potmaat op basis van gewenste plantgrootte (11L voor 40-60cm plant, 26L voor 80cm+)
- Week 3-8: Groeifase — 18/6 lichtschema, pH 6.0-6.5 (aarde) / 5.5-6.0 (coco/hydro), EC 1.2-1.8
- Bloeiweek 1: Schakel naar 12/12 lichtschema — plant strekt tot 2x
- Bloeiweek 2-3: Eerste bloeiharen verschijnen
- Bloeiweek 4-6: Toppen vormen zich
- Bloeiweek 7-8: Spoelfase — alleen water, flush voeding eruit
- Oogst: Trichomen melkwit/amber = oogsttijd

LICHT TIPS:
- LED voordelen: minder warmte, energiezuiniger, langere levensduur, betere terpenproductie
- HPS voordelen: krachtige dieptestraling, bewezen technologie, goedkoper instapprijs
- Zaailingen: 7-10 cm afstand van lamp, ook spaarlampen geschikt eerste 2 weken
- LED afstand: 30-60cm (check fabrieksspecificaties)
- HPS afstand: 40-60cm bij 400W, 50-80cm bij 600W+

WATER & VOEDING:
- Aarde: water als bovenste laag droog is, til pot op voor gewichtgevoel
- pH aarde: 6.0-6.5 | pH coco/hydro: 5.5-6.0
- Bio kweken: geen pH meten nodig bij actief bodemleven + organische voeding
- EC groeifase: 1.2-1.6 | EC bloeifase: 1.6-2.2 | EC spoelfase: <0.5
- Mix eerst voeding, daarna pas pH aanpassen

VEELVOORKOMENDE PROBLEMEN:
- Gele bladeren onderaan + paarse stelen → fosfaatgebrek → pH controleren + fosfaatvoeding
- Gele bladeren bovenaan / verbrande punten → stikstofoverschot of lichtverbranding → lamp hoger / voeding verminderen
- Krul omhoog + droge randen → hittestress of te weinig water → temperatuur check, meer water
- Krul omlaag + zwaar aanvoelende pot → overwatering → minder water, betere drainage
- Witte poederachtige vlekken op bladeren → meeldauw → GEN200 Control / betere ventilatie
- Gele stipjes + fijn webben onderkant bladeren → spintmijt → neem olie / Pyrethrum behandeling
- Slappe plant + natte bodem + bruine wortels → wortelrot → Biocanna Rhizotonic / Cannazym
- Internervenale vergeling (gele bladeren met groene nerven) → Ca/Mg gebrek → BioBizz CalMag
- Punten verbranden bij voldoende afstand → voedingstoxiciteit → spoel + verlaag EC

function addMsg(role, text, imgType, imgBase64) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  let content = '';
  if (role === 'assistant') {
    // Extra safety: strip any remaining JSON-like content
    text = text.replace(/\{[\s\S]*?"products"[\s\S]*?\]/g, '').trim();
    // Convert bullet points to styled elements
    text = text.replace(/^• (.+)$/gm, '<li>$1</li>');
    const lines = text.split('\n');
    let inChoices = false;
    let choiceHtml = '';
    lines.forEach(function(line) {
      const m = line.match(/^\s*[→\-\>]+\s*([A-Fa-f1-9][)\.]\s*.{2,})/);
      if (m) {
        if (!inChoices) { inChoices = true; choiceHtml = '<div class="choices">'; }
        choiceHtml += '<button class="choice-btn" onclick="pickChoice(this)">' + m[1].trim() + '</button>';
      } else {
        if (inChoices) {
          // Always add "Anders, namelijk..." option
          choiceHtml += '<button class="choice-btn choice-custom" data-custom="true" onclick="pickChoice(this)" style="border-style:dashed;color:var(--muted)">✏️ Anders, namelijk... (typ in de chat hieronder)</button>';
          content += choiceHtml + '</div>';
          inChoices = false; choiceHtml = '';
        }
        const bold = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        if (bold.trim()) content += '<p>' + bold + '</p>';
        else if (!inChoices) content += '<br>';
      }
    });
    if (inChoices) {
      choiceHtml += '<button class="choice-custom" data-custom="true" onclick="pickChoice(this)" style="border-style:dashed;color:var(--muted);background:var(--white);border:1.5px dashed var(--border);border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left;width:100%">✏️ Anders, namelijk... (typ in de chat hieronder)</button>';
      content += choiceHtml + '</div>';
    }
  } else {
    content = '<p>' + text + '</p>';
  }
  d.innerHTML = '<div class="avatar">' + (role==='user'?'JIJ':'GD') + '</div><div class="bubble">' + content + '</div>';
  msgEl.appendChild(d);
  msgEl.scrollTop = msgEl.scrollHeight;
}

// Pending answers for multi-question batching
var pendingAnswers = [];
var pendingTimer = null;

function pickChoice(btn) {
  const isCustom = btn.dataset.custom === 'true';
  if (isCustom) {
    inputEl.focus();
    inputEl.placeholder = 'Typ hier je antwoord en druk op Enter...';
    inputEl.style.borderColor = 'var(--green)';
    setTimeout(() => { inputEl.placeholder = 'Beschrijf je kweeksituatie of stel een vraag...'; inputEl.style.borderColor = ''; }, 8000);
    inputEl.scrollIntoView({behavior: 'smooth'});
    return;
  }

  // Find which question group this button belongs to
  var choicesDiv = btn.closest('.choices');
  
  // Disable this choice group only
  choicesDiv.querySelectorAll('.choice-btn').forEach(function(b) {
    b.disabled = true; b.style.opacity = '0.4';
  });
  btn.style.opacity = '1'; btn.style.background = 'var(--green)'; btn.style.color = '#fff';

  // Add answer to pending batch
  pendingAnswers.push(btn.textContent.trim());

  // Check how many unanswered choice groups remain in the last message
  var lastMsg = document.querySelector('.msg.assistant:last-of-type');
  var allGroups = lastMsg ? lastMsg.querySelectorAll('.choices') : [];
  var unanswered = 0;
  allGroups.forEach(function(g) {
    var hasSelected = g.querySelector('.choice-btn[style*="rgb(30, 107, 60)"]') || 
                      g.querySelector('.choice-btn[style*="#1e6b3c"]');
    if (!hasSelected) unanswered++;
  });

  // Clear existing timer
  if (pendingTimer) clearTimeout(pendingTimer);

  if (unanswered === 0) {
    // All questions answered - send combined message after short delay
    pendingTimer = setTimeout(function() {
      var combined = pendingAnswers.join(' | ');
      pendingAnswers = [];
      inputEl.value = combined;
      sendMessage();
    }, 400);
  } else {
    // Still more questions - wait 10s max before sending anyway
    pendingTimer = setTimeout(function() {
      if (pendingAnswers.length > 0) {
        var combined = pendingAnswers.join(' | ');
        pendingAnswers = [];
        inputEl.value = combined;
        sendMessage();
      }
    }, 10000);
  }
}

function mergeProducts(newProds, addOnly) {
  if (!newProds || !newProds.length) return;

  // Kit definitions - what each complete kit INCLUDES (so we can remove duplicates)
  var KIT_INCLUDES = {
    'garden highpro complete': ['tent','kweektent','led','lamp','verlichting','afzuiger','ventilat','filter','koolstof','clipfan','pot','kweekpot','timer','schakelklok','hygrometer','thermo','rope ratchet','ophang','slangklem','combiconnect'],
    'complete kweektent': ['tent','kweektent','led','lamp','verlichting','afzuiger','ventilat','filter','koolstof','clipfan','pot','kweekpot','timer','schakelklok','hygrometer','thermo','rope ratchet','ophang','slangklem'],
  };

  function getKitType(name) {
    name = (name || '').toLowerCase();
    for (var kit in KIT_INCLUDES) {
      if (name.includes(kit)) return kit;
    }
    return null;
  }

  function isIncludedInKit(productName, kitType) {
    if (!kitType || !KIT_INCLUDES[kitType]) return false;
    var name = (productName || '').toLowerCase();
    var included = KIT_INCLUDES[kitType];
    return included.some(function(term) { return name.includes(term); });
  }

  // Helper: extract brand from product name
  function getBrand(name) {
    name = (name || '').toLowerCase();
    var brands = ['biobizz','canna','dutchpro','advanced nutrients','plagron','atami',
                  'rhodos','hesi','aptus','athena','bionova','gen200','flower bomb',
                  'dutch masters','garden highpro','platinum','sunpro','fortis','lumen king'];
    for (var i = 0; i < brands.length; i++) {
      if (name.includes(brands[i])) return brands[i];
    }
    return null;
  }

  // Helper: extract size/volume from name (1L, 5L, 250ml, 10kg etc)
  function getSize(name) {
    var m = (name || '').match(/(\d+[\.,]?\d*)\s*(l|ml|kg|g)/i);
    return m ? m[0].toLowerCase().replace(',','.') : null;
  }

  // Helper: get base name without size (for size replacement detection)
  function getBaseName(name) {
    return (name || '').toLowerCase()
      .replace(/\d+[\.,]?\d*\s*(l|ml|kg|g)/gi, '')
      .replace(/\s+/g, ' ').trim();
  }

  // Skip all removal logic if addOnly mode
  if (addOnly) {
    newProds.forEach(function(np) {
      if (np.remove === true) return; // ignore remove flags in addOnly mode
      var existing = offerteProds.findIndex(function(op) {
        return op.name && np.name && op.name.toLowerCase() === np.name.toLowerCase();
      });
      if (existing >= 0) {
        offerteProds[existing] = Object.assign(offerteProds[existing], np);
      } else {
        offerteProds.unshift(np); // Add to TOP of list
      }
    });
    renderProducts(offerteProds, null);
    return;
  }

  // Step 0: detect if a COMPLETE KIT is being added → remove loose components it replaces
  newProds.forEach(function(np) {
    var kitType = getKitType(np.name);
    if (kitType) {
      // Remove any loose products that are included in this kit
      offerteProds = offerteProds.filter(function(op) {
        if (isIncludedInKit(op.name, kitType)) {
          console.log('Kit replaces:', op.name);
          return false; // remove
        }
        return true;
      });
    }
  });

  // Also: if loose components are added that conflict with an existing kit, warn but keep
  // (user may be upgrading specific component)

  // Step 1: detect brands being REPLACED
  // If new products have brand X and current offer has brand X in same category → remove old brand X
  var newBrandCats = {};
  newProds.forEach(function(np) {
    var brand = getBrand(np.name);
    var cat = (np.category || '').toLowerCase();
    if (brand) {
      // Only track brand replacements for actual product categories, not stackables
      var stackableCats2 = ['additief','additieven','accessoire','accessoires','meting','meter','controller','ophang','timer','hygrometer','slangklem','clipfan','rope'];
      var catLower = (np.category || '').toLowerCase();
      var isStackable2 = stackableCats2.some(function(sc) { return catLower.includes(sc); });
      if (!isStackable2) {
        var key = brand + '::' + catLower;
        newBrandCats[key] = true;
      }
    }
  });

  // Find brands in current offer that conflict with new brands in same category
  var toRemove = [];
  offerteProds.forEach(function(op, idx) {
    var brand = getBrand(op.name);
    var cat = (op.category || '').toLowerCase();
    if (!brand) return;

    // Check if new products replace this brand in this category
    var newKey = brand + '::' + cat;
    if (newBrandCats[newKey]) {
      // Same brand being updated - remove old, will add new
      toRemove.push(idx);
      return;
    }

    // Check if a DIFFERENT brand in same category is being added (brand swap)
    // BUT: never auto-remove additives, accessories, meters, controllers - those stack!
    var stackableCats = ['additief','additieven','accessoire','accessoires','meting','meter','controller','ophang','timer','hygrometer','slangklem','clipfan','rope'];
    var isStackable = stackableCats.some(function(sc) { return cat.includes(sc); });
    if (!isStackable) {
      var newBrandsInCat = newProds.filter(function(np) {
        return (np.category || '').toLowerCase() === cat && getBrand(np.name) !== brand;
      });
      if (newBrandsInCat.length > 0) {
        toRemove.push(idx);
      }
    }
  });

  // Step 2: detect size replacements (1L → 5L of hetzelfde product)
  newProds.forEach(function(np) {
    var newBase = getBaseName(np.name);
    offerteProds.forEach(function(op, idx) {
      if (toRemove.indexOf(idx) >= 0) return;
      var oldBase = getBaseName(op.name);
      // Same base name but different size = replacement
      if (newBase === oldBase && np.name !== op.name) {
        toRemove.push(idx);
      }
    });
  });

  // Remove old products (in reverse order to preserve indices)
  toRemove = toRemove.filter(function(v, i, a) { return a.indexOf(v) === i; });
  toRemove.sort(function(a, b) { return b - a; });
  toRemove.forEach(function(idx) { offerteProds.splice(idx, 1); });

  // Step 3: add/update new products
  newProds.forEach(function(np) {
    var existing = offerteProds.findIndex(function(op) {
      return op.name && np.name && op.name.toLowerCase() === np.name.toLowerCase();
    });
    if (existing >= 0) {
      offerteProds[existing] = Object.assign(offerteProds[existing], np);
    } else {
      offerteProds.unshift(np); // New products go to TOP
    }
  });

  renderProducts(offerteProds, null);
}

function addToCart(idx) {
  const p = offerteProds[idx];
  if (!p) return;
  const qty = p.qty || 1;
  const onGrowdeal = window.location.hostname.includes('growdeal.nl');
  if (onGrowdeal && p.id) {
    // WooCommerce AJAX — werkt alleen op growdeal.nl zelf
    const btn = document.querySelectorAll('.btn-cart')[idx];
    if (btn) { btn.textContent = 'Bezig...'; btn.disabled = true; }
    fetch('/wp-admin/admin-ajax.php', {
      method: 'POST',
      headers: {'Content-Type':'application/x-www-form-urlencoded'},
      body: 'action=add_to_cart&product_id=' + p.id + '&quantity=' + qty
    })
    .then(r => r.json())
    .then(data => {
      if (btn) { btn.textContent = '✓ Toegevoegd!'; btn.style.background = '#27ae60'; }
      // Update cart count if WooCommerce fragment refresh available
      if (typeof wc_add_to_cart_params !== 'undefined') {
        document.body.dispatchEvent(new CustomEvent('wc_fragment_refresh'));
      }
    })
    .catch(() => { window.open(p.url, '_blank'); });
  } else {
    // Fallback: open product pagina
    window.open(p.url || '#', '_blank');
  }
}

function openAll() {
  const onGrowdeal = window.location.hostname.includes('growdeal.nl');
  if (onGrowdeal) {
    offerteProds.forEach((p, i) => addToCart(i));
  } else {
    offerteProds.forEach(p => p.url && window.open(p.url, '_blank'));
  }
}

function changeQty(btn, delta) {
  const card = btn.closest('.product-card');
  const idx = parseInt(card.dataset.idx);
  const qtyEl = card.querySelector('.qty-val');
  const priceEl = card.querySelector('.line-price');
  let qty = parseInt(qtyEl.textContent) + delta;
  if (qty < 1) qty = 1;
  if (qty > 99) qty = 99;
  qtyEl.textContent = qty;
  offerteProds[idx].qty = qty;
  
  // Track qty changes for AI context
  const name = offerteProds[idx].name;
  if (name) {
    changedQty = changedQty.filter(c => c.name !== name);
    changedQty.push({name: name, qty: qty});
    if (changedQty.length > 10) changedQty.shift();
  }
  
  const unit = parseFloat(priceEl.dataset.unit);
  priceEl.textContent = '€' + (unit * qty).toFixed(2);
  const total = offerteProds.reduce((s,p) => s + parsePrice(p.price) * (p.qty||1), 0);
  document.getElementById('total-price').textContent = '€' + total.toFixed(0);
  document.getElementById('total-pill').textContent = '€' + total.toFixed(0);
}

// Track user preferences from removals and qty changes
var removedItems = [];
var changedQty = [];

function removeProduct(btn) {
  const card = btn.closest('.product-card');
  const idx = parseInt(card.dataset.idx);
  const removed = offerteProds[idx];
  
  // Track what was removed for AI context
  if (removed && removed.name) {
    removedItems.push(removed.name);
    // Limit memory to last 10 removals
    if (removedItems.length > 10) removedItems.shift();
  }
  
  offerteProds.splice(idx, 1);
  card.style.animation = 'slideOut .2s ease forwards';
  setTimeout(() => {
    card.remove();
    document.querySelectorAll('.product-card').forEach((c, i) => c.dataset.idx = i);
    const total = offerteProds.reduce((s,p) => s + parsePrice(p.price) * (p.qty||1), 0);
    document.getElementById('total-price').textContent = '€' + total.toFixed(0);
    document.getElementById('total-pill').textContent = '€' + total.toFixed(0);
    if (offerteProds.length === 0) {
      document.getElementById('products').style.display = 'none';
      document.getElementById('empty').style.display = 'flex';
      document.getElementById('totaal-bar').style.display = 'none';
      document.getElementById('seo-block').style.display = 'none';
      document.getElementById('total-pill').style.display = 'none';
    }
  }, 200);
}

async function openSearchPanel() {
  var panel = document.getElementById('search-panel');
  panel.style.display = 'block';
  document.getElementById('product-search-input').focus();
  document.getElementById('search-results').innerHTML = '';
}

function closeSearchPanel() {
  document.getElementById('search-panel').style.display = 'none';
  document.getElementById('product-search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
}

function searchAndShow(query) {
  var resultsEl = document.getElementById('search-results-top') || document.getElementById('search-results');
  if (!query || query.length < 2) { resultsEl.innerHTML = ''; return; }
  var results = searchProducts(query, 12);
  resultsEl.innerHTML = '';
  if (!results.length) {
    resultsEl.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px">Geen producten gevonden voor "'+query+'"</div>';
    return;
  }
  results.forEach(function(p) {
    var div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--white)';
    div.onmouseover = function(){ this.style.background = 'var(--bg)'; };
    div.onmouseout = function(){ this.style.background = 'var(--white)'; };
    div.onclick = function() { addSearchResult(p.u, p.i, p.n, p.p); };
    var imgEl = document.createElement('img');
    imgEl.src = p.i || '';
    imgEl.style.cssText = 'width:36px;height:36px;object-fit:contain;border-radius:4px;background:#f5f5f5;flex-shrink:0';
    imgEl.onerror = function(){ this.style.display='none'; };
    var info = document.createElement('div');
    info.style.cssText = 'flex:1;min-width:0';
    info.innerHTML = '<div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.n+'</div><div style="font-size:12px;color:var(--green);font-weight:600">'+(p.p||'')+'</div>';
    var plus = document.createElement('div');
    plus.style.cssText = 'font-size:18px;color:var(--green);font-weight:700;flex-shrink:0';
    plus.textContent = '+';
    div.appendChild(imgEl);
    div.appendChild(info);
    div.appendChild(plus);
    resultsEl.appendChild(div);
  });
}

function addSearchResult(url, img, name, price) {
  var newProd = {name: name, price: price, url: url, img: img, qty: 1, category: 'Toegevoegd', reason: 'Handmatig toegevoegd'};
  offerteProds.unshift(newProd);
  renderProducts(offerteProds, null);
  document.getElementById('products').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('totaal-bar').style.display = 'flex';
  document.getElementById('total-pill').style.display = 'block';
  // Update total
  var total = offerteProds.reduce(function(s,p) { return s + parsePrice(p.price) * (p.qty||1); }, 0);
  document.getElementById('total-price').textContent = '€' + total.toFixed(0);
  document.getElementById('total-pill').textContent = '€' + total.toFixed(0);
  // Close panel after adding
  closeSearchPanel();
}

var pendingImageBase64 = null;
var pendingImageType = null;

function handleImageUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    pendingImageBase64 = dataUrl.split(',')[1];
    pendingImageType = file.type || 'image/jpeg';
    
    // Show preview
    document.getElementById('img-preview').src = dataUrl;
    document.getElementById('img-preview-bar').style.display = 'flex';
    
    // Auto-focus input with hint
    inputEl.focus();
    inputEl.placeholder = 'Stel een vraag over je plant of stuur direct voor diagnose...';
    setTimeout(function() { inputEl.placeholder = 'Beschrijf je kweeksituatie of stel een vraag...'; }, 8000);
  };
  reader.readAsDataURL(file);
  event.target.value = ''; // Reset so same file can be uploaded again
}

function clearImage() {
  pendingImageBase64 = null;
  pendingImageType = null;
  document.getElementById('img-preview-bar').style.display = 'none';
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  document.getElementById('chips').style.display = 'none';
  sendBtn.disabled = true;
  extractCtx(text);
  addMsg('user', text);
  history.push({role:'user', content:text});
  showTyping();

  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1500,
        system: getSystem(text),
        messages: (function() {
          var msgs = history.slice(-8);
          // If there's a pending image, attach it to the last user message
          if (pendingImageBase64 && msgs.length > 0) {
            var lastMsg = msgs[msgs.length - 1];
            if (lastMsg.role === 'user') {
              msgs = msgs.slice(0, -1).concat([{
                role: 'user',
                content: [
                  {
                    type: 'image',
                    source: {
                      type: 'base64',
                      media_type: pendingImageType,
                      data: pendingImageBase64
                    }
                  },
                  {
                    type: 'text',
                    text: lastMsg.content
                  }
                ]
              }]);
            }
          }
          return msgs;
        })()
      })
    });
    const data = await res.json();
    removeTyping();
    const raw = data.content?.find(b=>b.type==='text')?.text || '';
    if (!raw && data.error) {
      removeTyping();
      const isRate = data.error.message && (data.error.message.includes('rate limit') || data.error.message.includes('overload'));
      if (isRate) {
        // Remove last user message from history so retry works cleanly
        if (history.length > 0 && history[history.length-1].role === 'user') {
          const lastMsg = history.pop();
          // Put it back in the input so user can easily resend
          inputEl.value = lastMsg.content;
        }
        addMsg('assistant', '⚠️ Even te druk — ik ben heel populair vandaag! Druk op ↑ om het opnieuw te proberen 🌱');
        sendBtn.disabled = false;
        inputEl.focus();
        inputEl.select();
      } else {
        addMsg('assistant', '⚠️ Er ging iets mis. Probeer opnieuw.');
        sendBtn.disabled = false;
        inputEl.focus();
      }
      return;
    }
    
    // Parse JSON from response
    let jsonData = null;
    // ALWAYS strip JSON blocks from chat text first
    let chatText = raw
      .replace(/<<+[A-Za-z]*>>+[\s\S]*?<<+[A-Za-z]*>>+/gi, '')   // with closing tag
      .replace(/<<+[A-Za-z]*>>+[\s\S]*/gi, '')                    // <<>> and everything after (no closing)
      .replace(/```[a-z]*[\s\S]*?```/gi, '')                      // backtick blocks
      .replace(/[,\s]*\{[\s\S]*?"products"[\s\S]*/g, '')       // bare JSON (with possible comma prefix)
      .replace(/\n{3,}/g, '\n\n')
      .trim();
    // Catch ALL JSON variants
    // 1. With closing tag: <<<JSON>>>...<<<ENDJSON>>> or <<>>...<<>>
    const tagMatch = raw.match(/<<+[A-Za-z]*>>+\s*([\s\S]*?)\s*<<+[A-Za-z]*>>+/i);
    // 2. Backtick blocks
    const tickMatch = !tagMatch && (raw.match(/```json\s*([\s\S]*?)```/i) || raw.match(/```\s*([\s\S]*?)```/));
    // 3. <<>> or similar tag followed by JSON WITHOUT closing tag
    // 3. <<>> followed by JSON (with possible comma/whitespace prefix)
    const openTagMatch = !tagMatch && !tickMatch && raw.match(/<<+[^>]*>>+[,\s]*(\{[\s\S]*)/);
    // 4. Bare JSON object anywhere in response
    const bareMatch = !tagMatch && !tickMatch && !openTagMatch && raw.match(/[,\s]*(\{[\s\S]*"products"[\s\S]*)/);
    
    let rawCand = null;
    if (tagMatch) rawCand = tagMatch[1];
    else if (tickMatch) rawCand = tickMatch[1];
    else if (openTagMatch) rawCand = openTagMatch[1];
    else if (bareMatch) rawCand = bareMatch[1];
    if (rawCand) {
      const cand = rawCand.trim();
      try {
        let p = JSON.parse(cand);
        // Normalize and flatten ANY JSON structure into products array
        function normalizeProducts(obj) {
          if (!obj) return null;
          // Direct array keys
          var directKeys = ['products','producten','items','aanbevelingen','offerte','setup','lijst'];
          for (var dk = 0; dk < directKeys.length; dk++) {
            if (Array.isArray(obj[directKeys[dk]])) return obj[directKeys[dk]];
          }
          // Object with sub-objects containing 'product' or 'naam'/'name' keys (like LICHT:{product:...})
          var collected = [];
          var keys = Object.keys(obj);
          for (var ki = 0; ki < keys.length; ki++) {
            var val = obj[keys[ki]];
            if (Array.isArray(val) && val.length > 0 && (val[0].name || val[0].naam || val[0].product || val[0].url)) {
              return val; // Found a proper products array
            }
            if (val && typeof val === 'object' && !Array.isArray(val)) {
              // Sub-object like "LICHT": {product: "...", qty: 35, url: "..."}
              if (val.product || val.naam || val.name || val.url) {
                var item = {
                  name: val.product || val.naam || val.name || keys[ki],
                  price: val.prijs_unit || val.prijs || val.price || '',
                  category: keys[ki],
                  reason: val.reden || val.reason || val.doel || '',
                  url: val.url || '',
                  img: val.img || val.image || val.afbeelding || '',
                  qty: val.qty || val.aantal || 1
                };
                collected.push(item);
              }
            }
          }
          return collected.length > 0 ? collected : null;
        }
        var normalizedProducts = normalizeProducts(p);
        if (normalizedProducts) p.products = normalizedProducts;
        if (p && p.products) {
          p.products = p.products.map(function(item) {
            return {
              name: item.name || item.naam || item.titel || item.product || '',
              price: item.price || item.prijs || item.prijs_unit || '',
              category: item.category || item.categorie || item.cat || '',
              reason: item.reason || item.reden || item.doel || item.omschrijving || item.note || item.recommendation || item.calculation || '',
              url: item.url || item.link || '',
              img: item.img || item.afbeelding || item.image || '',
              id: (item.id && item.id > 100) ? item.id : 0,
              qty: item.qty || item.aantal || 1,
              inStock: item.inStock !== false,
              emoji: item.emoji || ''
            };
          }).filter(function(item) {
            if (item.remove === true) {
              var removeName = (item.name || '').toLowerCase();
              // Match on full name OR partial name (first 20 chars)
              offerteProds = offerteProds.filter(function(op) {
                var opName = (op.name || '').toLowerCase();
                return !opName.includes(removeName.slice(0,20)) && !removeName.includes(opName.slice(0,20));
              });
              return false;
            }
            return item.url && item.url.includes('growdeal.nl') && item.name;
          });
          jsonData = p;
        }
      } catch(e) {
        try {
          const fixed = rawCand.trim().replace(/,(\s*[}\]])/g,'$1');
          let p = JSON.parse(fixed);
          var normalizedProducts2 = normalizeProducts(p);
          if (normalizedProducts2) p.products = normalizedProducts2;
          if (p && p.products) {
            p.products = p.products.map(function(item) {
              return {
                name: item.name || item.naam || item.titel || item.product || '',
                price: item.price || item.prijs || item.prijs_unit || '',
                category: item.category || item.categorie || item.cat || '',
                reason: item.reason || item.reden || item.doel || item.omschrijving || item.note || item.recommendation || item.calculation || '',
                url: item.url || item.link || '',
                img: item.img || item.afbeelding || item.image || '',
                id: item.id || 0,
                qty: item.qty || item.aantal || 1,
                emoji: item.emoji || ''
              };
            }).filter(function(item) {
              return item.url && item.url.includes('growdeal.nl') && item.name;
            });
            jsonData = p;
          }
        } catch(e2) { console.error('JSON parse failed:', e2.message, rawCand ? rawCand.slice(0,300) : 'no candidate'); }
      }
    }
    
    extractCtx(chatText);
    addMsg('assistant', chatText);
    // Only add to history if not an API error
    if (!raw.startsWith('API fout:') && !raw.includes('rate limit') && !raw.includes('overload')) {
      history.push({role:'assistant', content:raw});
    }
    
    if (jsonData && jsonData.products) {
      // Detect additive intent from last user message
      var lastUserMsg = '';
      for (var i = history.length - 1; i >= 0; i--) {
        if (history[i].role === 'user') { lastUserMsg = history[i].content.toLowerCase(); break; }
      }
      var addOnlyPatterns = /voeg.*toe|voeg.*bij|zet.*erbij|ook.*nodig|ik wil ook|ik wil een|ook.*toevoegen|toevoegen|aanvullen|add|ook.*graag|erbij.*zetten|ook.*hebben/;
      var isAddOnly = addOnlyPatterns.test(lastUserMsg);
      mergeProducts(jsonData.products, isAddOnly);
    }
  } catch(e) {
    removeTyping();
    addMsg('assistant', '⚠️ Even te druk! Probeer het nog een keer 🌱');
  }
  sendBtn.disabled = false;
  inputEl.focus();
}
